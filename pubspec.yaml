name: bookstr
description: Privacy-first e-book reader with offline support and online catalog
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.0
  go_router: ^14.2.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  file_picker: ^8.1.6
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  http: ^1.2.2
  cached_network_image: ^3.4.1
  share_plus: ^10.1.2
  flutter_pdfview: ^1.4.2
  epub_view: ^3.2.0
  fl_chart: ^0.70.0
  flutter_markdown: ^0.7.4+3
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.2
  package_info_plus: ^8.1.1
  device_info_plus: ^10.1.1
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  url_launcher: ^6.3.1
  path: ^1.9.0
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
