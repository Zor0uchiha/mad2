name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Create asset directories
        run: mkdir -p assets/images assets/icons assets/fonts

      - name: Create Flutter project files
        run: flutter create .

      - name: Patch Android SDK, AGP, and Kotlin version
        run: |
          # Set compileSdk to 35 (override flutter.compileSdkVersion)
          sed -i "s/compileSdk = flutter.compileSdkVersion/compileSdk = 35/" android/app/build.gradle || true
          sed -i "s/compileSdk [0-9]\+/compileSdk = 35/" android/app/build.gradle || true
          # Update AGP version (newer templates use plugins block in settings.gradle)
          sed -i 's/"com.android.application" version "[^"]*"/"com.android.application" version "8.7.3"/' android/settings.gradle || true
          # Fallback: old templates use classpath in build.gradle
          sed -i 's/com\.android\.tools\.build:gradle:[0-9.]\+/com.android.tools.build:gradle:8.7.3/' android/build.gradle || true
          # Update Kotlin version (newer templates: settings.gradle)
          sed -i 's/org\.jetbrains\.kotlin\.android" version "[^"]*"/org.jetbrains.kotlin.android" version "2.0.21"/' android/settings.gradle || true
          # Fallback: old templates use ext.kotlin_version in build.gradle
          sed -i "s/ext\.kotlin_version = '[^']*'/ext.kotlin_version = '2.0.21'/" android/build.gradle || true
          # Update gradle wrapper for AGP 8.7.x
          sed -i "s|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip|" android/gradle/wrapper/gradle-wrapper.properties || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
